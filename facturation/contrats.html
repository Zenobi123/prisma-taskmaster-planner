<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Contrats - PRISMA GESTION</title>
    <script src="assets/css/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="prisma-print.css">
    <link rel="stylesheet" href="assets/css/inter-font.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <a href="index.html" class="inline-flex items-center px-3 py-1.5 border border-white rounded-lg shadow-sm text-white hover:bg-white hover:text-blue-900 transition-colors duration-200">← PRISMA GESTION</a>
                <span class="text-sm text-blue-200 ml-4">Gestion des Contrats</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <!-- En-tête -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Gestion des Contrats</h1>
                    <p class="text-gray-600 text-sm">Gérez les contrats de vos clients</p>
                </div>
                <button onclick="showAddForm()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Nouveau Contrat
                </button>
            </div>
        </div>

        <!-- Formulaire d'ajout (caché par défaut) -->
        <div id="addForm" class="bg-white rounded-lg shadow-md p-6 mb-6 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Créer un nouveau contrat</h2>
            <form onsubmit="saveContrat(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Client *</label>
                    <select id="contratClient" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <option value="">-- Sélectionner un client --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Type de contrat *</label>
                    <select id="contratType" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <option value="Assistance comptable">Assistance comptable</option>
                        <option value="Gestion fiscale">Gestion fiscale</option>
                        <option value="Gestion sociale / paie">Gestion sociale / paie</option>
                        <option value="Mission ponctuelle">Mission ponctuelle</option>
                        <option value="Abonnement mensuel">Abonnement mensuel</option>
                        <option value="Abonnement annuel">Abonnement annuel</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Référence du contrat *</label>
                    <input type="text" id="contratReference" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Mode de facturation *</label>
                    <select id="contratFacturation" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <option value="Forfait">Forfait</option>
                        <option value="Mensuel">Mensuel</option>
                        <option value="Par mission">Par mission</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Date de début *</label>
                    <input type="date" id="contratDebut" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Date de fin</label>
                    <input type="date" id="contratFin" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Montant contractuel (F CFA) *</label>
                    <input type="number" id="contratMontant" required min="0" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Statut *</label>
                    <select id="contratStatut" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                        <option value="Actif">Actif</option>
                        <option value="Suspendu">Suspendu</option>
                        <option value="Terminé">Terminé</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Prestations incluses</label>
                    <textarea id="contratPrestations" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" placeholder="Ex: Déclarations fiscales mensuelles, tenue comptable, conseil..."></textarea>
                </div>
                <div class="md:col-span-2 flex gap-4">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                        Enregistrer
                    </button>
                    <button type="button" onclick="hideAddForm()" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">
                        Annuler
                    </button>
                </div>
            </form>
        </div>

        <!-- Liste des contrats -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Liste des contrats</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-gray-800 text-white text-sm">
                            <th class="px-4 py-3 text-left">Référence</th>
                            <th class="px-4 py-3 text-left">Client</th>
                            <th class="px-4 py-3 text-left">Type</th>
                            <th class="px-4 py-3 text-left">Début</th>
                            <th class="px-4 py-3 text-left">Fin</th>
                            <th class="px-4 py-3 text-right">Montant</th>
                            <th class="px-4 py-3 text-center">Statut</th>
                            <th class="px-4 py-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="contratsList">
                        <tr>
                            <td colspan="8" class="text-center py-8 text-gray-500">Aucun contrat enregistré</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="prisma-components.js"></script>
    <script>
        // Charger les contrats depuis localStorage
        function loadContrats() {
            const contrats = JSON.parse(localStorage.getItem('contrats') || '[]');
            const tbody = document.getElementById('contratsList');
            
            if (contrats.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500">Aucun contrat enregistré</td></tr>';
                return;
            }
            
            tbody.innerHTML = contrats.map((contrat, index) => {
                const dateDebut = new Date(contrat.dateDebut).toLocaleDateString('fr-FR');
                const dateFin = contrat.dateFin ? new Date(contrat.dateFin).toLocaleDateString('fr-FR') : 'Indéterminée';
                
                return `
                <tr class="border-b hover:bg-gray-50 text-sm">
                    <td class="px-4 py-3 font-semibold text-blue-900">${contrat.reference}</td>
                    <td class="px-4 py-3">${contrat.clientName}</td>
                    <td class="px-4 py-3 text-xs">${contrat.type}</td>
                    <td class="px-4 py-3 text-xs">${dateDebut}</td>
                    <td class="px-4 py-3 text-xs">${dateFin}</td>
                    <td class="px-4 py-3 text-right font-semibold">${contrat.montant.toLocaleString('fr-FR')} F</td>
                    <td class="px-4 py-3 text-center">
                        <span class="inline-block px-2 py-1 rounded text-xs font-semibold ${
                            contrat.statut === 'Actif' ? 'bg-green-100 text-green-800' : 
                            contrat.statut === 'Suspendu' ? 'bg-yellow-100 text-yellow-800' : 
                            'bg-gray-100 text-gray-800'
                        }">
                            ${contrat.statut}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="editContrat(${index})" class="text-blue-600 hover:text-blue-800 mx-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button onclick="deleteContrat(${index})" class="text-red-600 hover:text-red-800 mx-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        // Charger les clients
        function loadClientSelect() {
            const clients = JSON.parse(localStorage.getItem('clients') || '[]');
            const select = document.getElementById('contratClient');
            
            clients.forEach((client, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = client.name;
                select.appendChild(option);
            });
        }

        // Afficher le formulaire
        function showAddForm() {
            document.getElementById('addForm').classList.remove('hidden');
            document.getElementById('contratClient').focus();
            
            // Auto-générer la référence
            const contrats = JSON.parse(localStorage.getItem('contrats') || '[]');
            const num = String(contrats.length + 1).padStart(4, '0');
            document.getElementById('contratReference').value = `CONT-${num}/2026`;
        }

        // Masquer le formulaire
        function hideAddForm() {
            document.getElementById('addForm').classList.add('hidden');
            document.getElementById('addForm').querySelector('form').reset();
        }

        // Enregistrer un contrat
        function saveContrat(event) {
            event.preventDefault();
            
            const clientIndex = document.getElementById('contratClient').value;
            const clients = JSON.parse(localStorage.getItem('clients') || '[]');
            const client = clients[clientIndex];
            
            const contrat = {
                id: Date.now(),
                clientId: client.id,
                clientName: client.name,
                reference: document.getElementById('contratReference').value,
                type: document.getElementById('contratType').value,
                facturation: document.getElementById('contratFacturation').value,
                dateDebut: document.getElementById('contratDebut').value,
                dateFin: document.getElementById('contratFin').value,
                montant: parseFloat(document.getElementById('contratMontant').value),
                statut: document.getElementById('contratStatut').value,
                prestations: document.getElementById('contratPrestations').value,
                createdAt: new Date().toISOString()
            };
            
            const contrats = JSON.parse(localStorage.getItem('contrats') || '[]');
            contrats.push(contrat);
            localStorage.setItem('contrats', JSON.stringify(contrats));
            
            hideAddForm();
            loadContrats();
            PrismaToast.success('Contrat enregistré avec succès !');
        }

        // Supprimer un contrat
        function deleteContrat(index) {
            PrismaModal.confirmDelete('Êtes-vous sûr de vouloir supprimer ce contrat ?', () => {
                const contrats = JSON.parse(localStorage.getItem('contrats') || '[]');
                contrats.splice(index, 1);
                localStorage.setItem('contrats', JSON.stringify(contrats));
                loadContrats();
                PrismaToast.success('Contrat supprimé');
            });
        }

        // Éditer un contrat
        function editContrat(index) {
            const contrats = JSON.parse(localStorage.getItem('contrats') || '[]');
            const contrat = contrats[index];
            const clients = JSON.parse(localStorage.getItem('clients') || '[]');
            const clientIndex = clients.findIndex(c => c.id === contrat.clientId);
            
            if (clientIndex >= 0) {
                document.getElementById('contratClient').value = clientIndex;
            }
            document.getElementById('contratReference').value = contrat.reference;
            document.getElementById('contratType').value = contrat.type;
            document.getElementById('contratFacturation').value = contrat.facturation;
            document.getElementById('contratDebut').value = contrat.dateDebut;
            document.getElementById('contratFin').value = contrat.dateFin || '';
            document.getElementById('contratMontant').value = contrat.montant;
            document.getElementById('contratStatut').value = contrat.statut;
            document.getElementById('contratPrestations').value = contrat.prestations || '';
            
            showAddForm();
            
            // Supprimer l'ancien puis sauvegarder
            const form = document.getElementById('addForm').querySelector('form');
            form.onsubmit = function(e) {
                e.preventDefault();
                deleteContrat(index);
                saveContrat(e);
                form.onsubmit = saveContrat;
            };
        }

        // Charger au démarrage
        loadClientSelect();
        loadContrats();
    </script>
</body>
</html>
